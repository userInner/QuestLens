[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/",
    "@injective/=lib/injective-core/contracts/"
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
injective = "https://injective-rpc.publicnode.com"
injective_testnet = "https://testnet.sentry.tm.injective.network:443"
local = "http://localhost:8545"

[etherscan]
injective = { key = "", url = "https://explorer.injective.network" }

[fmt]
line_length = 100
