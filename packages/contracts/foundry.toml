[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["TaskEscrow", "ReputationRegistry"]
fs_permissions = [{ access = "read-write", path = "./" }]

[invariant]
runs = 64
depth = 64
fail_on_revert = false
call_override = false

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[rpc_endpoints]
injective_testnet = "${INJECTIVE_TESTNET_RPC}"
injective_mainnet = "${INJECTIVE_MAINNET_RPC}"

[etherscan]
# Injective explorer API endpoints can be added here once available.
